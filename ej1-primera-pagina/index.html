<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title> APUNTE HTML </title> <!--aca va el tituo que aparece en la pestaña --> 
    </head>
    <body>
        <h1> TITULO </h1> <!--aca va el TITULO principal -->
        <p> Todo lo que escribas entre p y p se muestra como un bloque de texto separado  </p> <!--entre las p se escriben los parrafos  -->
        <p> Si quiero otro párrafo, abro otro p nuevo, no seguís en el mismo </p>
        <img src="https://desarrolloweb.com/storage/manual_images/v9KWpJmKyGROdRlde8BzFKQLumRHunXmUJfwU66X.jpg" alt="caratula HTML "> <!--va la direccion de imagen descargada o de interet y en el alt lo que dice sino carga la imagen -->
        <h2>Cosas de HTML que aprendí</h2> <!-- subtitulos se hacen entre h2  -->
        <ul><!-- crea lista  -->
            <li>comentar</li> <!-- entre li van los textos listados-->
            <li>poner titulo</li>
            <li>escribir parrafos</li>
        </ul>
        <a href="https://www.youtube.com/watch?v=nc3pdrEM4I8">Video de YouTube</a> <!-- te lleva a otra direccion (otra pagina), entre los >< finales es el texto que se lee-->



        
    </body>
</html>
