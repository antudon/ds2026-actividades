        <h1>Contacto</h1>
        <p>Completá el formulario y me contacto a la brevedad.</p>

        <form>
            <p>
                <label>Nombre:</label>
                <input type="text" placeholder="Tu nombre" required minlength="2">
            </p>
            <p>
                <label>Email:</label>
                <input type="email" placeholder="tu@email.com" required>
            </p>
            <p>
                <label>Mensaje:</label>
                <textarea placeholder="Escribi tu mensaje" required minlength="10"></textarea>
            </p>
            <p>
                <button type="submit">Enviar</button>
            </p>
        </form>
    </body>
